media:
  - name: images
    label: Images
    input: images
    output: /images
    extensions: [svg, png, jpg, jpeg, webp, gif]

content:

  # ── Most frequently updated ──────────────────────────────────────────────────

  - name: term_dates
    label: "Term Dates"
    type: file
    path: _data/term-dates.json
    format: json
    fields:
      - name: terms
        label: Terms
        type: object
        list:
          collapsible: true
          collapsed: false
          summary: "{name} \u2014 {dates}"
        fields:
          - name: name
            label: Term
            type: string
            description: "e.g. Term 1"
          - name: lessons
            label: Number of lessons
            type: string
            description: "e.g. 8 lessons"
          - name: dates
            label: Dates
            type: string
            description: "e.g. 8 Feb \u2013 5 Apr"
      - name: note
        label: Note below the table
        type: string
        description: "Small reminder shown under the term dates table"

  - name: faqs
    label: "FAQs"
    type: file
    path: _data/faqs.json
    format: json
    fields:
      - name: faqs
        label: Questions & Answers
        type: object
        list:
          collapsible: true
          collapsed: true
          summary: "{question}"
        fields:
          - name: question
            label: Question
            type: string
          - name: answer
            label: Answer
            type: text
            description: "Update prices, waitlist notes, and other details here."

  # ── Occasionally updated ─────────────────────────────────────────────────────

  - name: teachers
    label: "Teachers"
    type: file
    path: _data/teachers.json
    format: json
    fields:
      - name: teachers
        label: Teachers
        type: object
        list:
          collapsible: true
          collapsed: true
          summary: "{name} \u2014 {role}"
        fields:
          - name: name
            label: Full name
            type: string
          - name: role
            label: Instruments / role
            type: string
            description: "e.g. Cello  or  Guitar & Keyboard"
          - name: bio
            label: Bio
            type: text
            description: "1\u20132 sentences. Leave blank to hide."

  - name: committee
    label: "Committee"
    type: file
    path: _data/committee.json
    format: json
    fields:
      - name: committee
        label: Committee members
        type: object
        list:
          collapsible: true
          collapsed: false
          summary: "{name} \u2014 {role}"
        fields:
          - name: name
            label: Name
            type: string
            description: "Full name, or leave as 'Committee Member' if not yet confirmed"
          - name: role
            label: Role
            type: string
            description: "e.g. Chairperson, Secretary, Treasurer, Gallery Coordinator"
          - name: bio
            label: Bio (optional)
            type: text
            description: "Short bio. Leave blank to hide."

  - name: instruments
    label: "Instrument Classes"
    type: file
    path: _data/instruments.json
    format: json
    fields:
      - name: instruments
        label: Instruments
        type: object
        list:
          collapsible: true
          collapsed: true
          summary: "{name}"
        fields:
          - name: name
            label: Name
            type: string
          - name: emoji
            label: Icon (emoji)
            type: string
            description: "Single emoji, e.g. \ud83c\udfbb"
          - name: summary
            label: Short description (Home page)
            type: string
            description: "One sentence shown on the home page grid"
          - name: description
            label: Full description (Classes page)
            type: text
            description: "Full paragraph shown on the Classes page. Include hire costs, waitlist notes, etc."
          - name: tag
            label: Age / tag badge
            type: string
            description: "e.g. Ages 7+   or   Free!   or   2+ years experience"
          - name: free
            label: Free class?
            type: boolean
            description: "Turn on for classes with no extra cost (e.g. Choir)"
          - name: show_on_home
            label: Show on Home page?
            type: boolean
            description: "Should this instrument appear in the grid on the home page?"

  # ── When you have testimonials ready ─────────────────────────────────────────

  - name: testimonials
    label: "Testimonials (What Parents Say)"
    type: file
    path: _data/testimonials.json
    format: json
    fields:
      - name: testimonials
        label: Testimonials
        type: object
        list:
          collapsible: true
          collapsed: true
          summary: "{author}"
        fields:
          - name: quote
            label: Quote
            type: text
            description: "The parent's words \u2014 no quotation marks needed."
          - name: author
            label: Attribution
            type: string
            description: "e.g. Parent of a violin student"

settings:
  hide: true
